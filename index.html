<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./style.css">
    <script src="./script.js" defer></script>
    <title>Calculator</title>
</head>
<body>
    <div class="main">
        <div class="screen">
            <div id="upperscreen"></div>
            <div id="lowerscreen">0</div>
        </div>
        <div class="buttons">
            <div class="row five">
                <button data-code='Delete' id="clear">CLEAR</button>
                <button data-code='Backspace' id="backspace">⌫</button>
            </div>
            <div class="row four">
                <button data-code='7' class="number-button" id="seven">7</button>
                <button data-code='8' class="number-button" id="eight">8</button>
                <button data-code='9' class="number-button" id="nine">9</button>
                <button data-code='/' class="operator-button" id="operator-divide">÷</button>
            </div>
            <div class="row three">
                <button data-code='4' class="number-button" id="four">4</button>
                <button data-code='5' class="number-button" id="five">5</button>
                <button data-code='6' class="number-button" id="six">6</button>
                <button data-code='*' class="operator-button" id="operator-multiply">×</button>
            </div>
            <div class="row two">
                <button data-code='1' class="number-button" id="one">1</button>
                <button data-code='2' class="number-button" id="two">2</button>
                <button data-code='3' class="number-button" id="three">3</button>
                <button data-code='-' class="operator-button" id="operator-subtract">-</button>
            </div>
            <div class="row one">
                <button data-code='.' id="dot">.</button>
                <button data-code='0' class="number-button" id="zero">0</button>
                <button data-code='Enter' class="operator-button" id="operator-count">=</button>
                <button data-code='+' class="operator-button" id="operator-add">+</button>
            </div>
        </div>
    </div>
</body>
</html>
