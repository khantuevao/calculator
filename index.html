<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./style.css">
    <script src="./script.js" defer></script>
    <title>Calculator</title>
</head>
<body>
    <div class="main">
        <div class="screen">
            <div id="upperscreen"></div>
            <div id="lowerscreen">0</div>
        </div>
        <div class="buttons">
            <div class="row five">
                <button data-key='46' id="clear">CLEAR</button>
                <button data-key='8' id="backspace">⌫</button>
            </div>
            <div class="row four">
                <button data-key='55' class="number-button" id="seven">7</button>
                <button data-key='56' class="number-button" id="eight">8</button>
                <button data-key='57' class="number-button" id="nine">9</button>
                <button data-key='191' class="operator-button" id="operator-divide">÷</button>
            </div>
            <div class="row three">
                <button data-key='52' class="number-button" id="four">4</button>
                <button data-key='53' class="number-button" id="five">5</button>
                <button data-key='54' class="number-button" id="six">6</button>
                <button data-key='106' class="operator-button" id="operator-multiply">×</button>
            </div>
            <div class="row two">
                <button data-key='49' class="number-button" id="one">1</button>
                <button data-key='50' class="number-button" id="two">2</button>
                <button data-key='51' class="number-button" id="three">3</button>
                <button data-key='109' class="operator-button" id="operator-subtract">-</button>
            </div>
            <div class="row one">
                <button data-key='190' id="dot">.</button>
                <button data-key='48' class="number-button" id="zero">0</button>
                <button data-key='13' class="operator-button" id="operator-count">=</button>
                <button data-key='107' class="operator-button" id="operator-add">+</button>
            </div>
        </div>
    </div>
</body>
</html>
